<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superman</title>

    <link rel="stylesheet" href=".css">
</head>
<body>
    <header>
        <div class="infoHeader">

            <h1>Superman: O alien que nos ensina a ser humano</h1>

            <nav>
                <a href="https://why-i-love-comics.tumblr.com/post/657247652502781952/superman-red-blue-5-generations-2021-by" target="_blank">
                    Leia aqui
                </a>

                <a href="https://segredosdomundo.r7.com/superman-historia/" target="_blank">
                    Leia mais sobre
                </a>

                <a href="https://www.megacurioso.com.br/artes-cultura/122095-como-o-super-homem-se-tornou-um-dos-super-herois-mais-populares.htm" target="_blank">
                    A origem do herói
                </a>
            </nav>

        </div>
    </header>

    <main class="hero">

        <img src="https://upload.wikimedia.org/wikipedia/en/3/35/Supermanflying.png" alt="Superman">

        <div class="texto">
            <h2>O maior herói da DC</h2>

            <p>
                Superman é um símbolo de esperança, coragem e justiça.
                Mesmo vindo de outro planeta, ele escolheu proteger a humanidade.
            </p>

            <button>Salvar Metrópolis 🦸</button>
        </div>

    </main>

    <script>
        const botao = document.querySelector("button");

        botao.addEventListener("click", () => {
            alert("Metropolis foi salva pelo Superman! 🦸");
        });
    </script>

</body>
</html>
