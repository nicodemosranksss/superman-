<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superman</title>

    <link rel="stylesheet" href=".css">
</head>

<body>

    <header>

        <div class="infoHeader">

            <h1>Superman: O alien que nos ensina a ser humano</h1>

            <nav>

                <a href="https://segredosdomundo.r7.com/superman-historia/" target="_blank">
                    História
                </a>

                <a href="https://www.megacurioso.com.br/artes-cultura/122095-como-o-super-homem-se-tornou-um-dos-super-herois-mais-populares.htm" target="_blank">
                    Origem
                </a>

                <a href="https://why-i-love-comics.tumblr.com/" target="_blank">
                    Comics
                </a>

            </nav>

        </div>

    </header>

    <main class="hero">

        <img src="https://upload.wikimedia.org/wikipedia/en/3/35/Supermanflying.png" alt="Superman">

        <div class="texto">

            <h2>O maior herói da DC</h2>

            <p>
                Superman representa esperança, justiça e coragem.
                Mesmo sendo um alienígena, ele escolheu proteger a humanidade.
            </p>

            <button id="botaoHeroi">
                Salvar Metrópolis 🦸
            </button>

        </div>

    </main>

    <script>
        const botao = document.getElementById("botaoHeroi");

        botao.addEventListener("click", () => {
            alert("Metropolis foi salva pelo Superman!");
        });
    </script>

</body>
</html>
